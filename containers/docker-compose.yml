# FLUXOS C++ — Docker Compose
#
# The intended workflow is a 4-step path:
#
#   1. Install / start Docker on the host.
#   2. Build the container image (installs deps, ships source):
#        docker compose -f containers/docker-compose.yml build
#   3. Open a shell inside the container:
#        docker compose -f containers/docker-compose.yml run --rm fluxos
#   4. Compile FLUXOS inside the shell. The whole repo is bind-mounted at
#      /work, so edits on the host are picked up without rebuilding the image,
#      and every file the binary writes (binary itself, simulation results,
#      etc.) lands on the host filesystem automatically.
#        cd /work && mkdir -p build && cd build
#        cmake -DMODE_release=ON -DUSE_TRIMESH=ON \
#              -DCMAKE_RUNTIME_OUTPUT_DIRECTORY=/work/bin /work
#        make -j$(nproc)
#      Then run the model (still inside the shell, from /work so modset
#      relative paths resolve correctly):
#        cd /work
#        ./bin/fluxos Working_example/modset_river_30h.json
#
#      Simulation outputs land at whichever folder the modset's
#      OUTPUT.OUTPUT_FOLDER names — e.g. "Results_river_30h/" — on the HOST
#      filesystem, sibling to bin/ and Working_example/.
#
# Enable MPI at image-build time (brings OpenMPI into the image):
#   USE_MPI=ON docker compose -f containers/docker-compose.yml build
#
# Bind mount:
#   ..                 -> /work  (read-write) — the whole repo. Sources,
#                                                inputs (Working_example/),
#                                                compiled binary (bin/),
#                                                and every Results*/ folder
#                                                are all the same files on
#                                                the host and in the container.

services:
  fluxos:
    image: fluxos:${FLUXOS_TAG:-latest}
    build:
      context: ..
      dockerfile: containers/Dockerfile
      args:
        USE_MPI: ${USE_MPI:-OFF}
    working_dir: /work
    volumes:
      - ..:/work
    # Needed so `docker compose run` gives a nice interactive shell.
    stdin_open: true
    tty: true
    # Default: drop the user into a shell. Step 4 happens here.
    command: ["/bin/bash"]
